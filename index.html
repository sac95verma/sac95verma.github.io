<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── SEO & Social ──────────────────────────────────────────────────── -->
  <title>Sachin Verma — Senior Software Engineer</title>
  <meta name="description" content="Senior Software Engineer with 8+ years in FinTech, Healthcare & E-Commerce. Building scalable systems, payment infrastructure & AI-powered solutions." />
  <meta name="author"      content="Sachin Verma" />
  <meta name="keywords"    content="Sachin Verma, Software Engineer, FinTech, TypeScript, Python, Dubai" />

  <!-- Open Graph -->
  <meta property="og:title"       content="Sachin Verma — Senior Software Engineer" />
  <meta property="og:description" content="8+ years building payment systems, AI platforms & high-scale infrastructure." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://sac95verma.github.io" />

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary" />
  <meta name="twitter:title"       content="Sachin Verma — Senior Software Engineer" />
  <meta name="twitter:description" content="8+ years in FinTech, Healthcare & E-Commerce." />

  <!-- ── Favicon (terminal > character) ──────────────────────────────── -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0e0a'/><text y='.9em' font-size='80' fill='%2300ff41'>❯</text></svg>" />

  <!-- ── Stylesheets ──────────────────────────────────────────────────── -->
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/terminal.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/mobile-nav.css" />
</head>
<body>

  <!-- CRT noise overlay -->
  <div class="noise-overlay" aria-hidden="true"></div>

  <!-- ════════════════════════════════════════════════════════════════════
       TERMINAL WINDOW
       ════════════════════════════════════════════════════════════════════ -->
  <div class="terminal-wrap">

    <!-- ── Title Bar ──────────────────────────────────────────────────── -->
    <div class="titlebar" role="banner">

      <div class="titlebar__dots" aria-hidden="true">
        <div class="titlebar__dot titlebar__dot--close"  title="Close"></div>
        <div class="titlebar__dot titlebar__dot--min"    title="Minimize"></div>
        <div class="titlebar__dot titlebar__dot--max"    title="Maximize"></div>
      </div>

      <div class="titlebar__label">
        sachin@portfolio — bash — 132×50 &nbsp;|&nbsp; <span id="titlebar-time">--:--:--</span>
      </div>

      <!-- Desktop nav -->
      <nav class="titlebar__nav" aria-label="Portfolio sections">
        <button class="nav-tab is-active" data-section="about"      aria-label="About">~/about</button>
        <button class="nav-tab"           data-section="experience"  aria-label="Experience">~/experience</button>
        <button class="nav-tab"           data-section="skills"      aria-label="Skills">~/skills</button>
        <button class="nav-tab"           data-section="education"   aria-label="Education">~/education</button>
        <button class="nav-tab"           data-section="contact"     aria-label="Contact">~/contact</button>
      </nav>

    </div><!-- /titlebar -->

    <!-- ── Screen ─────────────────────────────────────────────────────── -->
    <main class="screen" role="main">

      <!-- ── ABOUT ──────────────────────────────────────────────────── -->
      <section id="section-about" class="section is-active" aria-label="About">

        <!-- Boot sequence (shown first, then hidden) -->
        <div id="boot-container" class="boot-seq" aria-live="polite"></div>

        <!-- Hero content (hidden until boot completes) -->
        <div id="about-hero-content" style="display:none">
          <!-- Populated by render.js -->
        </div>

      </section>

      <!-- ── EXPERIENCE ─────────────────────────────────────────────── -->
      <section id="section-experience" class="section" aria-label="Experience">
        <!-- Populated by render.js -->
      </section>

      <!-- ── SKILLS ────────────────────────────────────────────────── -->
      <section id="section-skills" class="section" aria-label="Skills">
        <!-- Populated by render.js -->
      </section>

      <!-- ── EDUCATION ─────────────────────────────────────────────── -->
      <section id="section-education" class="section" aria-label="Education">
        <!-- Populated by render.js -->
      </section>

      <!-- ── CONTACT ───────────────────────────────────────────────── -->
      <section id="section-contact" class="section" aria-label="Contact">
        <!-- Populated by render.js -->
      </section>

    </main><!-- /screen -->

  </div><!-- /terminal-wrap -->

  <!-- ════════════════════════════════════════════════════════════════════
       MOBILE BOTTOM NAV
       ════════════════════════════════════════════════════════════════════ -->
  <nav class="mobile-nav" aria-label="Mobile navigation">
    <ul class="mobile-nav__list" role="list">
      <li><button class="mobile-nav__btn is-active" data-section="about">
        <span class="mobile-nav__icon">👤</span>
        <span class="mobile-nav__label">about</span>
      </button></li>
      <li><button class="mobile-nav__btn" data-section="experience">
        <span class="mobile-nav__icon">💼</span>
        <span class="mobile-nav__label">work</span>
      </button></li>
      <li><button class="mobile-nav__btn" data-section="skills">
        <span class="mobile-nav__icon">⚙️</span>
        <span class="mobile-nav__label">skills</span>
      </button></li>
      <li><button class="mobile-nav__btn" data-section="education">
        <span class="mobile-nav__icon">🎓</span>
        <span class="mobile-nav__label">edu</span>
      </button></li>
      <li><button class="mobile-nav__btn" data-section="contact">
        <span class="mobile-nav__icon">📡</span>
        <span class="mobile-nav__label">ping</span>
      </button></li>
    </ul>
  </nav>

  <!-- ── Scripts (order matters) ──────────────────────────────────────── -->
  <script src="data/resume.js"></script>
  <script src="js/boot.js"></script>
  <script src="js/skills.js"></script>
  <script src="js/render.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
